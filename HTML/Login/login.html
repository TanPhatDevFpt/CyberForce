<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Poppins", sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

  <div class="bg-white/10 backdrop-blur-lg p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white/20">
    <h2 class="text-3xl font-semibold text-white text-center mb-6">Đăng Nhập Tài Khoản</h2>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="text-white text-sm">Email</label>
        <input id="email" type="email" placeholder="you@example.com"
          class="w-full mt-1 px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white" />
      </div>

      <div>
        <label class="text-white text-sm">Password</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••"
            class="w-full mt-1 px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white" />
          <span onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-white">👁</span>
        </div>
      </div>

      <div class="flex items-center justify-between text-sm text-white">
        <label class="flex items-center gap-2">
          <input type="checkbox" class="accent-white" /> Lưu Nhớ
        </label>
        <a href="#" class="hover:underline">Quên mật khẩu?</a>
      </div>

      <button type="submit"
        class="w-full py-3 rounded-xl bg-white text-purple-600 font-semibold hover:scale-105 transition-transform">
        Đăng Nhập
      </button>

      <div class="text-center text-white/80 text-sm">Phương thức đăng nhập</div>

      <div class="flex gap-3">
        <button type="button" class="flex-1 py-2 rounded-xl bg-white/20 text-white hover:bg-white/30 transition">Google</button>
        <button type="button" class="flex-1 py-2 rounded-xl bg-white/20 text-white hover:bg-white/30 transition">Facebook</button>
      </div>

      <p class="text-center text-white text-sm mt-4">
        Don't have an account?
        <a href="#" class="font-semibold underline">Đăng Ký Tài Khoản</a>
      </p>
    </form>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById("password");
      input.type = input.type === "password" ? "text" : "password";
    }

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
      }

      // Fake login (sau này thay bằng API)
      if (email === "admin@gmail.com" && password === "123456") {
        localStorage.setItem("user", JSON.stringify({ email }));
        window.location.href = "/index.html";
      } else {
        alert("Sai tài khoản hoặc mật khẩu!");
      }
    });
  </script>

</body>
</html>
